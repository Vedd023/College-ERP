<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="College ERP System — Login">
  <title>College ERP — Login</title>
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <div class="brand">
        <h1>🎓 College ERP</h1>
        <p>Sign in to your account</p>
      </div>

      <form id="loginForm">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" class="form-control" placeholder="Enter email" required>
          <div class="form-error"></div>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" class="form-control" placeholder="Enter password" required>
          <div class="form-error"></div>
        </div>
        <button type="submit" class="btn btn-primary" id="loginBtn">Sign In</button>
        <div id="loginError" class="login-error"></div>
      </form>

      <div style="text-align:center;margin:20px 0 12px">
        <span style="color:var(--text-secondary);font-size:0.8rem">— or —</span>
      </div>

      <button class="btn btn-secondary" id="googleBtn" style="width:100%;justify-content:center;gap:8px">
        <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
        Sign in with Google
      </button>

      <p style="text-align:center;margin-top:20px;font-size:0.85rem">
        New student? <a href="register.html">Register here</a>
      </p>
    </div>
  </div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
  <script src="assets/js/firebase-config.js"></script>
  <script src="assets/js/storage.js"></script>
  <script src="assets/js/utils.js"></script>
  <script src="assets/js/auth.js"></script>
  <script>
    // If already logged in, redirect
    auth.onAuthStateChanged(async (user) => {
      if (user) {
        const profile = await db.collection('users').doc(user.uid).get();
        if (profile.exists) {
          sessionStorage.setItem('justLoggedIn', 'true');
          window.location.href = 'pages/dashboard.html';
        }
      }
    });

    // Role tab quick-fill
    document.querySelectorAll('.role-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.role-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        // We appended @demo.com to match Firebase Auth emails
        const rawUser = tab.dataset.user;
        const emailToUse = rawUser.includes('@') ? rawUser : rawUser + '@demo.com';
        document.getElementById('email').value = emailToUse;
        document.getElementById('password').value = tab.dataset.pass;
      });
    });

    // Email/Password login
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();
      const errEl = document.getElementById('loginError');
      errEl.style.display = 'none';
      try {
        document.getElementById('loginBtn').disabled = true;
        document.getElementById('loginBtn').textContent = 'Signing in...';
        await Auth.loginWithEmail(email, password);
        sessionStorage.setItem('justLoggedIn', 'true');
        window.location.href = 'pages/dashboard.html';
      } catch (err) {
        errEl.textContent = err.message || 'Invalid email or password';
        errEl.style.display = 'block';
        document.getElementById('loginBtn').disabled = false;
        document.getElementById('loginBtn').textContent = 'Sign In';
      }
    });

    // Google Sign-In
    document.getElementById('googleBtn').addEventListener('click', async () => {
      const errEl = document.getElementById('loginError');
      errEl.style.display = 'none';
      try {
        const result = await Auth.loginWithGoogle();
        if (result.isNew) {
          // New Google user — redirect to registration to complete profile
          sessionStorage.setItem('google_reg', JSON.stringify({ uid: result.uid, email: result.email, name: result.name }));
          window.location.href = 'register.html?google=1';
        } else {
          sessionStorage.setItem('justLoggedIn', 'true');
          window.location.href = 'pages/dashboard.html';
        }
      } catch (err) {
        errEl.textContent = err.message || 'Google sign-in failed';
        errEl.style.display = 'block';
      }
    });
  </script>
</body>
</html>
