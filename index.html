<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="College ERP System — Login">
  <title>EduNexus — Login</title>
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <div class="brand" style="display:flex;flex-direction:column;align-items:center;gap:12px">
        <img src="assets/img/logo.png" alt="EduNexus Logo" style="height:60px;width:auto" onerror="this.style.display='none'">
        <h1 style="color:var(--primary);margin:0">EduNexus</h1>
        <p>Sign in to your account</p>
      </div>

      <div class="login-tabs" style="display:flex;margin-bottom:20px;background:var(--bg-secondary);padding:4px;border-radius:8px">
        <button class="login-tab active" data-role="student" style="flex:1;padding:8px;border:none;border-radius:6px;background:var(--primary);color:white;cursor:pointer;font-weight:500">Student</button>
        <button class="login-tab" data-role="faculty" style="flex:1;padding:8px;border:none;border-radius:6px;background:transparent;color:var(--text-secondary);cursor:pointer;font-weight:500">Faculty</button>
        <button class="login-tab" data-role="admin" style="flex:1;padding:8px;border:none;border-radius:6px;background:transparent;color:var(--text-secondary);cursor:pointer;font-weight:500">Admin</button>
      </div>

      <form id="loginForm">
        <div class="form-group">
          <label for="loginId" id="idLabel">Student ID</label>
          <input type="text" id="loginId" class="form-control" placeholder="Enter Student ID" required>
          <div class="form-error"></div>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" class="form-control" placeholder="Enter password" required>
          <div class="form-error"></div>
        </div>
        <button type="submit" class="btn btn-primary" id="loginBtn" style="width:100%">Sign In</button>
        <div style="text-align:right;margin-top:8px">
          <a href="#" id="forgotPasswordLink" style="font-size:0.8rem;color:var(--primary)">Forgot Password?</a>
        </div>
        <div id="loginError" class="login-error"></div>
      </form>

      <div style="text-align:center;margin:20px 0 12px">
        <span style="color:var(--text-secondary);font-size:0.8rem">— or —</span>
      </div>

      <button class="btn btn-secondary" id="googleBtn" style="width:100%;justify-content:center;gap:8px">
        <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
        Sign in with Google
      </button>

      <p style="text-align:center;margin-top:20px;font-size:0.85rem">
        New student? <a href="register.html">Register here</a>
      </p>
    </div>
  </div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
  <script src="assets/js/firebase-config.js"></script>
  <script src="assets/js/storage.js"></script>
  <script src="assets/js/utils.js"></script>
  <script src="assets/js/auth.js"></script>
  <script>
    let selectedRole = 'student';

    // If already logged in, redirect
    auth.onAuthStateChanged(async (user) => {
      if (user) {
        const profile = await db.collection('users').doc(user.uid).get();
        if (profile.exists) {
          sessionStorage.setItem('justLoggedIn', 'true');
          window.location.href = 'pages/dashboard.html';
        }
      }
    });

    // Role switcher
    document.querySelectorAll('.login-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.login-tab').forEach(t => {
            t.classList.remove('active');
            t.style.background = 'transparent';
            t.style.color = 'var(--text-secondary)';
        });
        tab.classList.add('active');
        tab.style.background = 'var(--primary)';
        tab.style.color = 'white';
        
        selectedRole = tab.dataset.role;
        const idLabel = document.getElementById('idLabel');
        const loginId = document.getElementById('loginId');
        
        if (selectedRole === 'student') {
            idLabel.textContent = 'Student ID';
            loginId.placeholder = 'e.g. STU001';
            loginId.type = 'text';
        } else if (selectedRole === 'faculty') {
            idLabel.textContent = 'Faculty ID';
            loginId.placeholder = 'e.g. FAC001';
            loginId.type = 'text';
        } else {
            idLabel.textContent = 'Email';
            loginId.placeholder = 'Enter admin email';
            loginId.type = 'email';
        }
      });
    });

    // Login Submission
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const idOrEmail = document.getElementById('loginId').value.trim();
      const password = document.getElementById('password').value.trim();
      const errEl = document.getElementById('loginError');
      errEl.style.display = 'none';
      
      try {
        const btn = document.getElementById('loginBtn');
        btn.disabled = true;
        btn.textContent = 'Signing in...';
        
        if (selectedRole === 'admin') {
            await Auth.loginWithEmail(idOrEmail, password);
        } else {
            await Auth.loginWithId(selectedRole, idOrEmail, password);
        }
        
        sessionStorage.setItem('justLoggedIn', 'true');
        window.location.href = 'pages/dashboard.html';
      } catch (err) {
        errEl.textContent = err.message || 'Invalid credentials';
        errEl.style.display = 'block';
        const btn = document.getElementById('loginBtn');
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    });

    // Google Sign-In
    document.getElementById('googleBtn').addEventListener('click', async () => {
      const errEl = document.getElementById('loginError');
      errEl.style.display = 'none';
      try {
        const result = await Auth.loginWithGoogle();
        if (result.isNew) {
          sessionStorage.setItem('google_reg', JSON.stringify({ uid: result.uid, email: result.email, name: result.name }));
          window.location.href = 'register.html?google=1';
        } else {
          sessionStorage.setItem('justLoggedIn', 'true');
          window.location.href = 'pages/dashboard.html';
        }
      } catch (err) {
        errEl.textContent = err.message || 'Google sign-in failed';
        errEl.style.display = 'block';
      }
    });

    // Forgot Password
    document.getElementById('forgotPasswordLink').addEventListener('click', async (e) => {
      e.preventDefault();
      const idOrEmail = document.getElementById('loginId').value.trim();
      if (!idOrEmail) {
        Utils.showToast(`Please enter your ${selectedRole === 'admin' ? 'email' : 'ID'} first`, 'info');
        return;
      }
      
      try {
        await Auth.forgotPassword(idOrEmail, selectedRole);
        Utils.showToast('Password reset email sent!', 'success');
      } catch (err) {
        Utils.showToast(err.message || 'Error sending reset email', 'error');
      }
    });
  </script>
</body>
</html>
