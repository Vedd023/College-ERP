<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>College ERP — Student Registration</title>
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
  <div class="login-page">
    <div class="login-card" style="max-width: 500px;">
      <div class="brand">
        <h1>🎓 Student Registration</h1>
        <p>Create your College ERP account</p>
      </div>

      <form id="registerForm">
        <div class="form-row">
          <div class="form-group">
            <label for="name">Full Name</label>
            <input type="text" id="name" name="name" class="form-control" required>
            <div class="form-error"></div>
          </div>
          <div class="form-group">
            <label for="studentId">Student ID (e.g. STU123)</label>
            <input type="text" id="studentId" name="studentId" class="form-control" required>
            <div class="form-error"></div>
          </div>
        </div>
        
        <div class="form-group" id="emailGroup">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" class="form-control" required>
          <div class="form-error"></div>
        </div>

        <div class="form-row" id="passwordRow">
          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" class="form-control" required minlength="6">
            <div class="form-error"></div>
          </div>
          <div class="form-group">
            <label for="confirmPassword">Confirm Password</label>
            <input type="password" id="confirmPassword" class="form-control" required minlength="6">
            <div class="form-error"></div>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="course">Course</label>
            <select id="course" name="course" class="form-control" required>
              <option value="">Select Course</option>
              <option value="B.Tech CSE">B.Tech CSE</option>
              <option value="B.Tech ECE">B.Tech ECE</option>
              <option value="BBA">BBA</option>
              <option value="MBA">MBA</option>
              <option value="B.Sc">B.Sc</option>
            </select>
            <div class="form-error"></div>
          </div>
          <div class="form-group">
            <label for="semester">Semester</label>
            <select id="semester" name="semester" class="form-control" required>
              <option value="">Select</option>
              <option value="1">1</option><option value="2">2</option><option value="3">3</option>
              <option value="4">4</option><option value="5">5</option><option value="6">6</option>
              <option value="7">7</option><option value="8">8</option>
            </select>
            <div class="form-error"></div>
          </div>
        </div>

        <div class="form-group">
          <label for="phone">Phone Number</label>
          <input type="tel" id="phone" name="phone" class="form-control" required>
          <div class="form-error"></div>
        </div>

        <button type="submit" class="btn btn-primary" id="registerBtn" style="width:100%; margin-top:10px;">Register</button>
        <div id="registerError" class="login-error"></div>
      </form>

      <p style="text-align:center;margin-top:20px;font-size:0.85rem">
        Already have an account? <a href="index.html">Sign in</a>
      </p>
    </div>
  </div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
  <script src="assets/js/firebase-config.js"></script>
  <script src="assets/js/storage.js"></script>
  <script src="assets/js/utils.js"></script>
  <script src="assets/js/auth.js"></script>
  <script>
    let isGoogleSignup = false;
    let googleUid = null;

    // Check if redirect from Google Sign-In
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('google') === '1') {
      const gData = JSON.parse(sessionStorage.getItem('google_reg') || '{}');
      if (gData.uid) {
        isGoogleSignup = true;
        googleUid = gData.uid;
        document.getElementById('email').value = gData.email || '';
        document.getElementById('email').readOnly = true;
        document.getElementById('name').value = gData.name || '';
        document.getElementById('passwordRow').style.display = 'none';
        document.getElementById('password').removeAttribute('required');
        document.getElementById('confirmPassword').removeAttribute('required');
        Utils.showToast('Please complete your profile to continue', 'info');
      }
    }

    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      if (!Utils.validateForm('registerForm')) return;

      const btn = document.getElementById('registerBtn');
      const errEl = document.getElementById('registerError');
      errEl.style.display = 'none';
      
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      
      if (!isGoogleSignup && password !== confirmPassword) {
        errEl.textContent = "Passwords do not match";
        errEl.style.display = 'block';
        return;
      }

      try {
        btn.disabled = true;
        btn.textContent = 'Registering...';

        const studentData = {
          name: document.getElementById('name').value.trim(),
          studentId: document.getElementById('studentId').value.trim(),
          course: document.getElementById('course').value,
          semester: document.getElementById('semester').value,
          email: email,
          phone: document.getElementById('phone').value.trim()
        };

        // 1. Create Student record in Firestore
        const studentRec = await Store.createItem('students', studentData);

        // 2. Create Auth User + Profile
        const profileData = {
          name: studentData.name,
          role: 'student',
          linkedId: studentRec.id // Link to student record
        };

        if (isGoogleSignup) {
          await Auth.completeGoogleProfile(googleUid, email, profileData);
          sessionStorage.removeItem('google_reg');
        } else {
          await Auth.register(email, password, profileData);
        }

        window.location.href = 'pages/dashboard.html';

      } catch (err) {
        errEl.textContent = err.message || 'Registration failed';
        errEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Register';
      }
    });
  </script>
</body>
</html>
