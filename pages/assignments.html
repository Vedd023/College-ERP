<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Assignments — College ERP</title>
  <link rel="stylesheet" href="../assets/css/styles.css">
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar" id="sidebar"></aside>
    <div class="main-content">
      <header class="topbar">
        <div class="topbar-left">
          <button class="hamburger" id="hamburger">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
              <rect x="3" y="6" width="18" height="2.5"/>
              <rect x="3" y="11" width="18" height="2.5"/>
              <rect x="3" y="16" width="18" height="2.5"/>
            </svg>
          </button>
          <h1>Assignments</h1>
        </div>
        <div class="topbar-right"></div>
      </header>
      <main class="page-content">
        <div class="toolbar">
          <div class="toolbar-left">
            <h2 id="roleTitle">Assignment Submissions</h2>
          </div>
          <div class="toolbar-right" id="assignmentActions">
            <!-- Dynamic button based on role -->
          </div>
        </div>

        <div id="assignmentsContainer" class="stats-grid">
          <!-- Populated by JS -->
        </div>

        <div class="card mt-3">
          <div class="card-header">
            <h3>Recent Submissions</h3>
          </div>
          <div class="table-wrapper">
            <table id="submissionsTable">
              <thead>
                <tr>
                  <th>Assignment</th><th>Student</th><th>Submission Link</th><th>Status</th><th>Date</th><th>Action</th>
                </tr>
              </thead>
              <tbody id="submissionsTableBody"></tbody>
            </table>
          </div>
        </div>
      </main>
    </div>
  </div>

  <!-- Submit Assignment Modal -->
  <div class="modal-overlay" id="submitModal">
    <div class="modal">
      <div class="modal-header">
        <h3>Submit Assignment</h3>
        <button class="modal-close" onclick="Utils.closeModal('submitModal')">&times;</button>
      </div>
      <form id="submissionForm">
        <div class="form-group">
          <label for="as_assignment">Select Assignment</label>
          <select name="assignmentId" id="as_assignment" class="form-control" required></select>
        </div>
        <div class="form-group">
          <label for="as_link">Google Drive Link</label>
          <input type="url" name="driveLink" id="as_link" class="form-control" placeholder="https://drive.google.com/..." required>
          <p style="font-size:0.75rem;color:var(--text-secondary);margin-top:4px">Make sure the link sharing is set to "Anyone with the link".</p>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" onclick="Utils.closeModal('submitModal')">Cancel</button>
          <button type="submit" class="btn btn-primary">Submit Now</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Create Assignment Modal (Faculty/Admin) -->
  <div class="modal-overlay" id="createModal">
    <div class="modal">
      <div class="modal-header">
        <h3>Create New Assignment</h3>
        <button class="modal-close" onclick="Utils.closeModal('createModal')">&times;</button>
      </div>
      <form id="createAssignmentForm">
        <div class="form-group">
          <label for="ca_title">Assignment Title</label>
          <input type="text" name="title" id="ca_title" class="form-control" placeholder="e.g. Database Lab 1" required>
        </div>
        <div class="form-group">
          <label for="ca_course">Target Course</label>
          <select name="course" id="ca_course" class="form-control" required>
            <option value="">Select Course</option>
            <option value="B.Tech CSE">B.Tech CSE</option>
            <option value="B.Tech ECE">B.Tech ECE</option>
            <option value="BBA">BBA</option>
            <option value="MBA">MBA</option>
            <option value="B.Sc">B.Sc</option>
          </select>
        </div>
        <div class="form-group">
          <label for="ca_due">Due Date</label>
          <input type="date" name="due" id="ca_due" class="form-control" required>
        </div>
        <div class="form-group">
          <label for="ca_link">Assignment Document Link (Optional)</label>
          <input type="url" name="link" id="ca_link" class="form-control" placeholder="https://drive.google.com/...">
        </div>
        <div class="form-group">
          <label for="ca_desc">Description</label>
          <textarea name="desc" id="ca_desc" class="form-control" rows="3" placeholder="Assignment details..."></textarea>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" onclick="Utils.closeModal('createModal')">Cancel</button>
          <button type="submit" class="btn btn-primary">Create Assignment</button>
        </div>
      </form>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
  <script src="../assets/js/firebase-config.js"></script>
  <script src="../assets/js/storage.js"></script>
  <script src="../assets/js/utils.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script src="../assets/js/sidebar.js"></script>
  <script src="../data/seed.js"></script>
  <script src="../assets/js/assignments.js"></script>
  <script>
    seedData();
    Auth.guard([]).then(user => {
      if (user) { Sidebar.init(); AssignmentsModule.init(user); }
    });
  </script>
</body>
</html>
