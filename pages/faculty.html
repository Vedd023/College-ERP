<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Faculty â€” College ERP</title>
  <link rel="stylesheet" href="../assets/css/styles.css">
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar" id="sidebar"></aside>
    <div class="main-content">
      <header class="topbar">
        <div class="topbar-left">
          <button class="hamburger" id="hamburger">â˜°</button>
          <h1>Faculty Management</h1>
        </div>
        <div class="topbar-right"></div>
      </header>
      <main class="page-content">
        <div class="toolbar">
          <div class="toolbar-left">
            <input type="text" class="search-input" id="searchFaculty" placeholder="Search faculty...">
          </div>
          <div class="toolbar-right" id="facultyActions">
            <button class="btn btn-secondary btn-sm" onclick="FacultyModule.exportCSV()">ðŸ“¥ Export CSV</button>
            <button class="btn btn-primary btn-sm" onclick="FacultyModule.openAddModal()">+ Add Faculty</button>
          </div>
        </div>
        <div class="card">
          <div class="table-wrapper">
            <table id="facultyTable">
              <thead><tr><th>Faculty ID</th><th>Name</th><th>Department</th><th>Email</th><th>Subjects</th><th>Actions</th></tr></thead>
              <tbody id="facultyTableBody"></tbody>
            </table>
          </div>
        </div>
      </main>
    </div>
  </div>

  <!-- Add/Edit Modal -->
  <div class="modal-overlay" id="facultyModal">
    <div class="modal">
      <div class="modal-header">
        <h3 id="facultyModalTitle">Add Faculty</h3>
        <button class="modal-close" onclick="Utils.closeModal('facultyModal')">âœ•</button>
      </div>
      <form id="facultyForm">
        <input type="hidden" name="id">
        <div class="form-row">
          <div class="form-group">
            <label>Full Name</label>
            <input type="text" name="name" class="form-control" required>
            <div class="form-error"></div>
          </div>
          <div class="form-group">
            <label>Faculty ID</label>
            <input type="text" name="facultyId" class="form-control" required placeholder="e.g. FAC006">
            <div class="form-error"></div>
          </div>
        </div>
        <div class="form-group">
          <label>Department</label>
          <select name="department" class="form-control" required>
            <option value="">Select Department</option>
            <option value="Computer Science">Computer Science</option>
            <option value="Electronics">Electronics</option>
            <option value="Business">Business</option>
            <option value="Mathematics">Mathematics</option>
          </select>
          <div class="form-error"></div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" class="form-control" required>
            <div class="form-error"></div>
          </div>
          <div class="form-group">
            <label>Phone</label>
            <input type="tel" name="phone" class="form-control" required>
            <div class="form-error"></div>
          </div>
        </div>
        <div class="form-group">
          <label>Assigned Subjects (hold Ctrl to select multiple)</label>
          <select name="subjects" id="subjectSelect" class="form-control" multiple style="height:100px"></select>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" onclick="Utils.closeModal('facultyModal')">Cancel</button>
          <button type="submit" class="btn btn-primary">Save Faculty</button>
        </div>
      </form>
    </div>
  </div>

  <div class="modal-overlay" id="deleteFacultyModal">
    <div class="modal" style="max-width:400px">
      <div class="modal-header"><h3>Confirm Delete</h3><button class="modal-close" onclick="Utils.closeModal('deleteFacultyModal')">âœ•</button></div>
      <p>Are you sure you want to delete this faculty member?</p>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="Utils.closeModal('deleteFacultyModal')">Cancel</button>
        <button class="btn btn-danger" id="confirmDeleteFacultyBtn">Delete</button>
      </div>
    </div>
  </div>

    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
  <script src="../assets/js/firebase-config.js"></script>
  <script src="../assets/js/storage.js"></script>
  <script src="../assets/js/utils.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script src="../assets/js/sidebar.js"></script>
  <script src="../data/seed.js"></script>
  <script src="../assets/js/faculty.js"></script>
  <script>
    seedData();
    Auth.guard(['admin']).then(user => {
      if (user) { Sidebar.init(); FacultyModule.init(user); }
    });
  </script>
</body>
</html>
