<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="../assets/css/styles.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>

<body>
  <div class="app-layout">
    <aside class="sidebar" id="sidebar"></aside>
    <div class="main-content">
      <header class="topbar">
        <div class="topbar-left">
          <button class="hamburger" id="hamburger">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
              <rect x="3" y="6" width="18" height="2.5"/>
              <rect x="3" y="11" width="18" height="2.5"/>
              <rect x="3" y="16" width="18" height="2.5"/>
            </svg>
          </button>

          <h1>Dashboard</h1>
        </div>
        <div class="topbar-right"></div>
      </header>
      <main class="page-content" id="dashboardContent">
        <!-- Populated by JS -->
      </main>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
  <script src="../assets/js/firebase-config.js"></script>
  <script src="../assets/js/storage.js"></script>
  <script src="../assets/js/utils.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script src="../assets/js/sidebar.js"></script>
  <script src="../data/seed.js"></script>
  <script src="../assets/js/dashboard.js"></script>
  <script>
    seedData();
    Auth.guard([]).then(user => {
      if (user) { Sidebar.init(); DashboardModule.init(user); }
    });
  </script>
</body>

</html>
